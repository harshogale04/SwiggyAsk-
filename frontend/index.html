<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiggy Annual Report — RAG QA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #171717;
      --border:    #2a2a2a;
      --border2:   #383838;
      --amber:     #f59e0b;
      --amber-dim: #92600a;
      --text:      #e8e3da;
      --muted:     #7a756c;
      --green:     #4ade80;
      --red:       #f87171;
      --radius:    4px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ---- Layout ---- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .logo-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .logo-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--amber);
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--amber-dim);
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s;
    }

    .status-dot.ready::before { background: var(--green); }
    .status-dot.error::before { background: var(--red); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ---- Hero ---- */
    .hero {
      margin-bottom: 3rem;
      animation: fadeUp 0.5s ease both;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--amber);
    }

    .hero p {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 540px;
      line-height: 1.7;
    }

    /* ---- Search box ---- */
    .search-section {
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
      background: var(--surface);
    }

    .input-row:focus-within {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.08);
    }

    #question-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      padding: 0.95rem 1.2rem;
      line-height: 1.5;
      resize: none;
    }

    #question-input::placeholder { color: var(--muted); }

    #ask-btn {
      background: var(--amber);
      color: #0f0f0f;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0 1.5rem;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      min-width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    #ask-btn:hover { background: #fbbf24; }
    #ask-btn:active { background: #d97706; }
    #ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      margin-top: 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .hint span { cursor: pointer; transition: color 0.15s; }
    .hint span:hover { color: var(--amber); }

    /* ---- Result card ---- */
    #result-section {
      margin-top: 2.5rem;
      animation: fadeUp 0.4s ease both;
    }

    .result-card {
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .result-question {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .result-question strong {
      color: var(--amber);
      font-weight: 500;
    }

    .answer-block {
      padding: 1.6rem 1.4rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }

    .answer-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.8rem;
    }

    .answer-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ---- Context accordion ---- */
    .context-section { padding: 0; }

    .context-toggle {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.9rem 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: color 0.15s, background 0.15s;
    }

    .context-toggle:hover {
      color: var(--text);
      background: rgba(255,255,255,0.02);
    }

    .context-toggle.open {
      border-bottom-color: var(--border);
    }

    .toggle-arrow {
      transition: transform 0.25s;
      font-size: 0.8rem;
    }

    .context-toggle.open .toggle-arrow { transform: rotate(180deg); }

    .context-list {
      display: none;
      padding: 0.8rem 1.4rem 1.2rem;
      gap: 1rem;
      flex-direction: column;
    }

    .context-list.open { display: flex; }

    .context-chunk {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      position: relative;
      transition: border-color 0.15s;
    }

    .context-chunk:hover { border-color: var(--border2); }

    .chunk-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .chunk-meta .page-tag {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      padding: 1px 6px;
      border-radius: 2px;
    }

    .chunk-score {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .score-bar-wrap {
      width: 50px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background: var(--amber);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .chunk-text {
      font-size: 0.83rem;
      color: #aaa59b;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    /* ---- Error ---- */
    .error-msg {
      margin-top: 1.5rem;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: var(--radius);
      background: rgba(248, 113, 113, 0.05);
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
    }

    /* ---- Spinner ---- */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(15, 15, 15, 0.3);
      border-top-color: #0f0f0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ---- Animations ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---- Utility ---- */
    .hidden { display: none !important; }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      main { padding: 2rem 1.2rem 5rem; }
      .hero h1 { font-size: 2rem; }
      #ask-btn { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-brand">Swiggy Report QA</span>
      <span class="logo-tag">RAG</span>
    </div>
    <div class="status-dot" id="status-indicator">checking</div>
  </header>

  <main>
    <section class="hero">
      <h1>Ask anything about<br><em>Swiggy's Annual Report</em></h1>
      <p>
        Answers are generated strictly from the FY 2023-24 Annual Report.
        No hallucination — every response is grounded in the source document.
      </p>
    </section>

    <section class="search-section">
      <div class="input-row">
        <textarea
          id="question-input"
          placeholder="e.g. What was Swiggy's total revenue in FY 2024?"
          rows="2"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button id="ask-btn" onclick="askQuestion()">
          <span id="btn-label">Ask</span>
        </button>
      </div>
      <div class="hint">
        <span onclick="setQuestion('What was Swiggy\'s revenue in FY 2024?')">Revenue FY24</span>
        <span onclick="setQuestion('How many active delivery partners does Swiggy have?')">Delivery partners</span>
        <span onclick="setQuestion('What are the key risks mentioned in the report?')">Key risks</span>
        <span onclick="setQuestion('What is Swiggy\'s market share in food delivery?')">Market share</span>
        <span onclick="setQuestion('What is the board composition of Swiggy?')">Board composition</span>
      </div>
    </section>

    <div id="result-section" class="hidden"></div>
    <div id="error-section" class="hidden error-msg"></div>
  </main>

  <script>
    // -----------------------------------------------------------------------
    // Status check
    // -----------------------------------------------------------------------
    async function checkStatus() {
      const el = document.getElementById('status-indicator');
      try {
        const res = await fetch('/health');
        const data = await res.json();
        if (data.status === 'ok') {
          el.textContent = `ready  |  ${data.indexed_chunks.toLocaleString()} chunks`;
          el.className = 'status-dot ready';
        } else {
          el.textContent = 'initializing';
          el.className = 'status-dot';
          setTimeout(checkStatus, 3000);
        }
      } catch {
        el.textContent = 'offline';
        el.className = 'status-dot error';
      }
    }

    checkStatus();

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function setQuestion(text) {
      const input = document.getElementById('question-input');
      input.value = text;
      input.focus();
    }

    function setLoading(loading) {
      const btn = document.getElementById('ask-btn');
      const label = document.getElementById('btn-label');
      if (loading) {
        btn.disabled = true;
        label.outerHTML = '<span id="btn-label"><div class="spinner"></div></span>';
      } else {
        btn.disabled = false;
        document.getElementById('btn-label').outerHTML =
          '<span id="btn-label">Ask</span>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // -----------------------------------------------------------------------
    // Context accordion toggle
    // -----------------------------------------------------------------------
    function toggleContext() {
      const btn = document.getElementById('ctx-toggle');
      const list = document.getElementById('ctx-list');
      btn.classList.toggle('open');
      list.classList.toggle('open');
    }

    // -----------------------------------------------------------------------
    // Keyboard shortcut
    // -----------------------------------------------------------------------
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        askQuestion();
      }
    });

    // -----------------------------------------------------------------------
    // Main ask function
    // -----------------------------------------------------------------------
    async function askQuestion() {
      const input = document.getElementById('question-input');
      const question = input.value.trim();
      if (!question) return;

      const resultSection = document.getElementById('result-section');
      const errorSection  = document.getElementById('error-section');

      resultSection.classList.add('hidden');
      errorSection.classList.add('hidden');
      setLoading(true);

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        renderResult(data);
        resultSection.classList.remove('hidden');
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        errorSection.textContent = 'Error: ' + err.message;
        errorSection.classList.remove('hidden');
      } finally {
        setLoading(false);
      }
    }

    // -----------------------------------------------------------------------
    // Render result
    // -----------------------------------------------------------------------
    function renderResult(data) {
      const section = document.getElementById('result-section');

      const chunks = data.context_used || [];
      const chunkItems = chunks.map((c, i) => {
        const pct = Math.round(c.score * 100);
        const barWidth = Math.min(pct, 100);
        return `
          <div class="context-chunk" style="animation: fadeUp 0.3s ${i * 0.06}s ease both">
            <div class="chunk-meta">
              <span class="page-tag">pg. ${c.page}</span>
              <span class="chunk-score">
                <div class="score-bar-wrap">
                  <div class="score-bar" style="width: ${barWidth}%"></div>
                </div>
                ${pct}%
              </span>
            </div>
            <div class="chunk-text">${escapeHtml(c.text)}</div>
          </div>
        `;
      }).join('');

      section.innerHTML = `
        <div class="result-card">
          <div class="result-question">
            <strong>Q /</strong> ${escapeHtml(data.question)}
          </div>
          <div class="answer-block">
            <div class="answer-label">Answer</div>
            <div class="answer-text">${escapeHtml(data.answer)}</div>
          </div>
          <div class="context-section">
            <button class="context-toggle" id="ctx-toggle" onclick="toggleContext()">
              <span>Supporting context  (${chunks.length} passage${chunks.length !== 1 ? 's' : ''})</span>
              <span class="toggle-arrow">&#9660;</span>
            </button>
            <div class="context-list" id="ctx-list">
              ${chunkItems}
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
